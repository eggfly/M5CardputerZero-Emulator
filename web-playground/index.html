<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M5CardputerZero — Online Playground</title>
<style>
  :root {
    --m5-blue: #1A73E8; --m5-blue-light: #4A9AF5; --m5-green: #07C160;
    --m5-bg: #1e1e1e; --m5-bg-light: #2b2b2b; --m5-sidebar: #262626;
    --m5-border: #3a3a3a; --m5-text: #ccc; --m5-text-dim: #888;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    background: var(--m5-bg); color: var(--m5-text);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }

  /* Header */
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 16px; background: var(--m5-sidebar);
    border-bottom: 1px solid var(--m5-border); flex-shrink: 0;
  }
  .logo {
    width: 32px; height: 32px; border-radius: 6px;
    background: var(--m5-blue); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px;
  }
  header h1 { font-size: 14px; font-weight: 600; }
  header .subtitle { font-size: 11px; color: var(--m5-text-dim); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .header-right a { font-size: 11px; color: var(--m5-blue-light); text-decoration: none; }
  .header-right a:hover { text-decoration: underline; }

  /* Toolbar */
  .toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 16px; background: var(--m5-bg-light);
    border-bottom: 1px solid var(--m5-border); flex-shrink: 0;
  }
  .m5-select {
    background: #333; border: 1px solid var(--m5-border); border-radius: 4px;
    padding: 5px 10px; font-size: 12px; color: #ccc; outline: none;
  }
  .m5-select:focus { border-color: var(--m5-blue); }
  .m5-btn {
    padding: 5px 14px; border-radius: 4px; font-size: 12px; font-weight: 500;
    border: none; cursor: pointer; transition: opacity 0.15s; white-space: nowrap;
  }
  .m5-btn:hover { opacity: 0.85; }
  .m5-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .m5-btn-blue { background: var(--m5-blue); color: #fff; }
  .m5-btn-green { background: var(--m5-green); color: #fff; }
  .toolbar-sep { width: 1px; height: 20px; background: var(--m5-border); }
  .toolbar label { font-size: 11px; color: var(--m5-text-dim); }

  /* Main split */
  .main { flex: 1; display: flex; overflow: hidden; }

  /* Editor pane */
  .editor-pane {
    flex: 1; display: flex; flex-direction: column;
    border-right: 1px solid var(--m5-border); min-width: 0;
  }
  .file-tabs {
    display: flex; background: var(--m5-sidebar);
    border-bottom: 1px solid var(--m5-border); overflow-x: auto; flex-shrink: 0;
  }
  .file-tab {
    padding: 6px 14px; font-size: 11px; color: var(--m5-text-dim);
    background: none; border: none; cursor: pointer;
    border-bottom: 2px solid transparent; white-space: nowrap;
  }
  .file-tab:hover { color: var(--m5-text); }
  .file-tab.active { color: #fff; border-bottom-color: var(--m5-blue); background: var(--m5-bg); }
  #editor-container { flex: 1; min-height: 0; }

  /* Emulator pane */
  .emu-pane {
    width: 420px; min-width: 320px; display: flex; flex-direction: column;
    align-items: center; padding: 12px; gap: 8px;
    background: #161622; overflow-y: auto;
  }
  .emu-pane iframe {
    border: none; border-radius: 8px; width: 100%; max-width: 400px;
    aspect-ratio: 1280/840; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .emu-hint { font-size: 10px; color: var(--m5-text-dim); text-align: center; line-height: 1.6; }

  /* Status bar */
  .statusbar {
    display: flex; align-items: center; gap: 12px;
    padding: 4px 16px; background: var(--m5-sidebar);
    border-top: 1px solid var(--m5-border); flex-shrink: 0;
    font-size: 11px; color: var(--m5-text-dim);
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-dot.green { background: var(--m5-green); }
  .status-dot.yellow { background: #f0ad4e; }

  @media (max-width: 800px) {
    .main { flex-direction: column; }
    .editor-pane { border-right: none; border-bottom: 1px solid var(--m5-border); }
    .emu-pane { width: 100%; flex-direction: row; flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">M5</div>
  <div>
    <h1>CardputerZero Playground</h1>
    <div class="subtitle">Edit code & run in browser emulator</div>
  </div>
  <div class="header-right">
    <a href="https://github.com/eggfly/M5CardputerZero-Emulator" target="_blank">GitHub</a>
    <a href="https://github.com/eggfly/M5CardputerZero-Emulator/releases" target="_blank">Downloads</a>
    <a href="https://docs.lvgl.io/" target="_blank">LVGL Docs</a>
  </div>
</header>

<div class="toolbar">
  <label>Example:</label>
  <select id="example-select" class="m5-select" onchange="loadExample(this.value)">
    <option value="applaunch">APPLaunch (Launcher)</option>
    <option value="userdemo">UserDemo (Status Bar)</option>
    <option value="helloworld">Hello World</option>
  </select>
  <div class="toolbar-sep"></div>
  <button class="m5-btn m5-btn-green" onclick="alert('Cloud compile coming soon!\n\nThis will use GitHub Actions to compile your code\nand run it in the emulator.')" title="Compile & run (coming soon)">
    ▶ Build & Run
  </button>
  <button class="m5-btn m5-btn-blue" onclick="reloadEmulator()">↻ Reload Emulator</button>
  <div class="toolbar-sep"></div>
  <label style="color:var(--m5-green)">Keyboard: Z/C=left/right, Enter=select</label>
</div>

<div class="main">
  <!-- Editor -->
  <div class="editor-pane">
    <div class="file-tabs" id="file-tabs"></div>
    <div id="editor-container"></div>
  </div>

  <!-- Emulator -->
  <div class="emu-pane">
    <iframe id="emu-frame" src="about:blank" allow="cross-origin-isolated"></iframe>
    <div class="emu-hint">
      Click keys on the device or use PC keyboard<br>
      320×170 LCD | LVGL 9.5 | SDL2 → WebAssembly
    </div>
  </div>
</div>

<div class="statusbar">
  <span class="status-dot green"></span>
  <span>Emulator running</span>
  <span>|</span>
  <span id="status-text">APPLaunch loaded</span>
</div>

<!-- Monaco Editor from CDN -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
<script>
// ── Example source files ────────────────────────────────────
const EXAMPLES = {
  applaunch: {
    files: {
      'main.cpp': `// APPLaunch — M5CardputerZero Launcher
// This is the default home screen with app carousel

#include "lvgl/lvgl.h"
#include "ui/ui.h"

#if LV_USE_SDL
static void lv_linux_disp_init(void) {
    lv_sdl_window_create(320, 170);
}
static void lv_linux_indev_init(void) {
    lv_sdl_mouse_create();
    lv_sdl_keyboard_create();
}
#endif

int main(void) {
    lv_init();
    lv_linux_disp_init();
    lv_linux_indev_init();

    // Initialize the launcher UI
    ui_init();

    // Main loop
    while (1) {
        lv_timer_handler();
        usleep(1000);
    }
    return 0;
}`,
      'ui/ui.h': `// SquareLine Studio generated UI
// Screen: 320x170, LVGL 9.5

#ifndef _UI_H
#define _UI_H

#include "lvgl/lvgl.h"

void ui_init(void);
void ui_Screen1_screen_init(void);

extern lv_obj_t *ui_Screen1;
extern lv_obj_t *ui_switchPanel;
extern lv_obj_t *ui_zuoPanel;
extern lv_obj_t *ui_youPanel;

// App icons loaded from PNG files
extern const char *ui_img_store_logo_png;
extern const char *ui_img_cli_logo_png;
extern const char *ui_img_claw_logo_png;

#endif`,
      'ui/ui_events.c': `// Keyboard event handler for app switching
#include "ui.h"
#include "compat/input_keys.h"

void main_key_switch(lv_event_t *e) {
    uint32_t key = LV_EVENT_KEYBOARD_GET_KEY(e);

    switch (key) {
        case KEY_LEFT:
        case KEY_Z:
            switchyou(NULL);  // Slide carousel right
            break;
        case KEY_RIGHT:
        case KEY_C:
            switchzuo(NULL);  // Slide carousel left
            break;
        case KEY_ENTER:
            app_launch(NULL); // Open selected app
            break;
        case KEY_ESC:
            break;
    }
}`,
    },
    desc: 'APPLaunch Launcher with app carousel'
  },

  userdemo: {
    files: {
      'main.cpp': `// UserDemo — Simple status bar + content area
#include "lvgl/lvgl.h"
#include "ui/ui.h"

int main(void) {
    lv_init();

    // Create SDL display (320x170)
    lv_sdl_window_create(320, 170);
    lv_sdl_mouse_create();
    lv_sdl_keyboard_create();

    // Init the UI (status bar + app area)
    ui_init();

    while (1) {
        lv_timer_handler();
        usleep(1000);
    }
    return 0;
}`,
      'ui/ui.c': `// UserDemo UI initialization
#include "ui.h"

lv_obj_t *ui_Screen1;
lv_obj_t *ui_logo;
lv_obj_t *ui_TimeLabel;
lv_obj_t *ui_apppage;

void ui_init(void) {
    lv_disp_t *dispp = lv_disp_get_default();
    lv_theme_t *theme = lv_theme_default_init(
        dispp,
        lv_palette_main(LV_PALETTE_BLUE),
        lv_palette_main(LV_PALETTE_RED),
        false, LV_FONT_DEFAULT
    );
    lv_disp_set_theme(dispp, theme);

    ui_Screen1_screen_init();
    lv_disp_load_scr(ui_Screen1);
}`,
    },
    desc: 'UserDemo with status bar'
  },

  helloworld: {
    files: {
      'main.cpp': `// Hello World — Minimal LVGL app for CardputerZero
// Display: 320x170 (ST7789V)

#include "lvgl/lvgl.h"

void create_ui(void) {
    lv_obj_t *scr = lv_screen_active();

    // Dark background
    lv_obj_set_style_bg_color(scr,
        lv_color_hex(0x1a1a2e), LV_PART_MAIN);

    // Title label
    lv_obj_t *title = lv_label_create(scr);
    lv_label_set_text(title, "Hello CardputerZero!");
    lv_obj_set_style_text_color(title,
        lv_color_hex(0x00CC66), LV_PART_MAIN);
    lv_obj_set_style_text_font(title,
        &lv_font_montserrat_20, LV_PART_MAIN);
    lv_obj_align(title, LV_ALIGN_CENTER, 0, -20);

    // Subtitle
    lv_obj_t *sub = lv_label_create(scr);
    lv_label_set_text(sub, "320x170 | LVGL 9.5 | Linux");
    lv_obj_set_style_text_color(sub,
        lv_color_hex(0x888888), LV_PART_MAIN);
    lv_obj_set_style_text_font(sub,
        &lv_font_montserrat_12, LV_PART_MAIN);
    lv_obj_align(sub, LV_ALIGN_CENTER, 0, 15);

    // Button
    lv_obj_t *btn = lv_button_create(scr);
    lv_obj_align(btn, LV_ALIGN_BOTTOM_MID, 0, -10);
    lv_obj_set_size(btn, 120, 30);

    lv_obj_t *btn_label = lv_label_create(btn);
    lv_label_set_text(btn_label, "Press Enter");
    lv_obj_center(btn_label);
}

int main(void) {
    lv_init();
    lv_sdl_window_create(320, 170);
    lv_sdl_mouse_create();
    lv_sdl_keyboard_create();

    create_ui();

    while (1) {
        lv_timer_handler();
        usleep(1000);
    }
    return 0;
}`,
    },
    desc: 'Minimal Hello World app'
  }
};

// ── Editor State ────────────────────────────────────────────
let editor = null;
let currentExample = 'applaunch';
let currentFile = null;
let models = {};

// ── Monaco Editor Setup ─────────────────────────────────────
require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' }});

require(['vs/editor/editor.main'], function () {
  monaco.editor.defineTheme('m5dark', {
    base: 'vs-dark',
    inherit: true,
    rules: [],
    colors: {
      'editor.background': '#1e1e1e',
      'editor.lineHighlightBackground': '#2a2a2a',
    }
  });

  editor = monaco.editor.create(document.getElementById('editor-container'), {
    theme: 'm5dark',
    fontSize: 13,
    fontFamily: "'JetBrains Mono', 'Fira Code', Menlo, monospace",
    minimap: { enabled: false },
    scrollBeyondLastLine: false,
    automaticLayout: true,
    readOnly: false,
    wordWrap: 'on',
    tabSize: 4,
  });

  loadExample('applaunch');
});

function loadExample(name) {
  currentExample = name;
  const ex = EXAMPLES[name];
  if (!ex) return;

  // Create models for each file
  models = {};
  const fileNames = Object.keys(ex.files);
  fileNames.forEach(f => {
    const lang = f.endsWith('.cpp') || f.endsWith('.h') ? 'cpp' : 'c';
    models[f] = monaco.editor.createModel(ex.files[f], lang);
  });

  // Build file tabs
  const tabsEl = document.getElementById('file-tabs');
  tabsEl.innerHTML = '';
  fileNames.forEach((f, i) => {
    const tab = document.createElement('button');
    tab.className = 'file-tab' + (i === 0 ? ' active' : '');
    tab.textContent = f;
    tab.onclick = () => switchFile(f);
    tabsEl.appendChild(tab);
  });

  // Show first file
  switchFile(fileNames[0]);
  document.getElementById('status-text').textContent = ex.desc;
}

function switchFile(name) {
  currentFile = name;
  if (editor && models[name]) {
    editor.setModel(models[name]);
  }
  document.querySelectorAll('.file-tab').forEach(t => {
    t.classList.toggle('active', t.textContent === name);
  });
}

// ── Emulator ────────────────────────────────────────────────
function reloadEmulator() {
  document.getElementById('emu-frame').src = 'emulator/index.html';
}

window.addEventListener('load', () => setTimeout(reloadEmulator, 300));

window.addEventListener('keydown', (e) => {
  if ([37,38,39,40,32].includes(e.keyCode)) {
    const active = document.activeElement;
    if (active && active.tagName === 'IFRAME') e.preventDefault();
  }
});
</script>
</body>
</html>
