<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M5CardputerZero Emulator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; display: flex; flex-direction: column;
         align-items: center; justify-content: center; min-height: 100vh;
         font-family: -apple-system, sans-serif; color: #eee; }
  h1 { font-size: 15px; margin: 8px 0 4px; color: #888; }
  canvas { width: 640px; height: 420px; border-radius: 8px; display: block;
           image-rendering: auto; }
  @media (max-width: 680px) {
    canvas { width: 95vw; height: calc(95vw * 840 / 1280); }
  }
  #status { margin-top: 6px; font-size: 12px; color: #555; }
  .spinner { display: inline-block; width: 12px; height: 12px;
             border: 2px solid #444; border-top-color: #0af;
             border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<h1>M5CardputerZero Emulator</h1>
<canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
<script>
  // Prevent browser from stealing arrow/space/tab keys from the emulator
  window.addEventListener('keydown', function(e) {
    if ([37,38,39,40,32,9,8,27].indexOf(e.keyCode) !== -1) {
      e.preventDefault();
    }
  }, {passive: false});
</script>
<div id="status"><span class="spinner"></span> Loading...</div>
<script>
  var Module = {
    canvas: document.getElementById('canvas'),
    onRuntimeInitialized: function() {
      document.getElementById('status').textContent =
        'Keyboard + mouse active. Click keys or type.';
      document.getElementById('canvas').focus();
    }
  };
</script>
