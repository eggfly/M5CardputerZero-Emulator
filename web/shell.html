<!DOCTYPE html>
<html>
<head>

<title>M5CardputerZero Emulator</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #1a1a2e; display: flex; flex-direction: column;
         align-items: center; justify-content: center; min-height: 100vh;
         font-family: -apple-system, sans-serif; color: #eee; }
  h1 { font-size: 16px; margin: 8px 0 4px; color: #aaa; }
  #canvas-wrap { width: 640px; max-width: 95vw; aspect-ratio: 1280/840; }
  canvas { width: 100%; height: 100%; border-radius: 8px; display: block; }
  #status { margin-top: 6px; font-size: 12px; color: #666; }
  .spinner { display: inline-block; width: 14px; height: 14px;
             border: 2px solid #555; border-top-color: #0af;
             border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<h1>M5CardputerZero Emulator</h1>
<div id="canvas-wrap">
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
</div>
<div id="status"><span class="spinner"></span> Loading...</div>
<script>
  var Module = {
    canvas: document.getElementById('canvas'),
    onRuntimeInitialized: function() {
      document.getElementById('status').textContent =
        'Keyboard + mouse active. Click keys or type.';
      document.getElementById('canvas').focus();
    }
  };
</script>
